kind = "web"
previewPath = "/"
title = "Maneki Neko Coin"
version = "1.0.0"
id = "artifacts/maneki-neko-coin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23444

[services.development]
run = "pnpm --filter @workspace/maneki-neko-coin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/maneki-neko-coin", "run", "build" ]
publicDir = "artifacts/maneki-neko-coin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23444"
BASE_PATH = "/"
